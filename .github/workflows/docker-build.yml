name: Build

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "sidecar/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    paths:
      - "api/**"
      - "sidecar/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # ── Dashboard image ──────────────────────────────────────────────────

  docker-amd64:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}:latest-amd64

  docker-arm64:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}:latest-arm64

  docker-manifest:
    runs-on: ubuntu-latest
    needs: [docker-amd64, docker-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:latest-amd64 \
            ghcr.io/${{ github.repository }}:latest-arm64

  # ── UFW sidecar image ───────────────────────────────────────────────

  sidecar-amd64:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: ./sidecar
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}/ufw-sidecar:latest-amd64

  sidecar-arm64:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: ./sidecar
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}/ufw-sidecar:latest-arm64

  sidecar-manifest:
    runs-on: ubuntu-latest
    needs: [sidecar-amd64, sidecar-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/ufw-sidecar:latest \
            ghcr.io/${{ github.repository }}/ufw-sidecar:latest-amd64 \
            ghcr.io/${{ github.repository }}/ufw-sidecar:latest-arm64
