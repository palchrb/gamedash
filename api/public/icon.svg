<!--
  Gamedash knock PWA icon — pixel "G" rendered as a 16x16 bitmap in the
  same 8-bit aesthetic as the Press Start 2P brand title in the PWA
  header. The 8x7 glyph sits centered in a 16x16 grid so the 80%
  maskable safe zone still covers it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <g fill="#4ade80">
    <rect x="5" y="4" width="6" height="1"/>
    <rect x="4" y="5" width="1" height="1"/>
    <rect x="11" y="5" width="1" height="1"/>
    <rect x="4" y="6" width="1" height="1"/>
    <rect x="4" y="7" width="1" height="1"/>
    <rect x="8" y="7" width="4" height="1"/>
    <rect x="4" y="8" width="1" height="1"/>
    <rect x="11" y="8" width="1" height="1"/>
    <rect x="4" y="9" width="1" height="1"/>
    <rect x="11" y="9" width="1" height="1"/>
    <rect x="5" y="10" width="6" height="1"/>
  </g>
</svg>
