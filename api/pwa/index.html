<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="{{BASE}}/manifest.json">
  <link rel="stylesheet" href="{{BASE}}/u.css">
  <title>Game Knock</title>
  {{INIT}}
</head>
<body>
  <main class="wrap">
    <header>
      <h1 id="greeting">…</h1>
      <div id="status" class="status">…</div>
    </header>

    <section id="auth-card" class="card hero" hidden>
      <h2 id="auth-title" data-i18n="knock.auth_title">Sign in</h2>
      <p id="auth-desc" class="meta" data-i18n="knock.auth_desc">
        This device needs to be approved once before you can play.
      </p>
      <button id="auth-register" class="big-btn" hidden data-i18n="knock.auth_register">
        Register this device
      </button>
      <button id="auth-login" class="big-btn" hidden data-i18n="knock.auth_login">
        Sign in with passkey
      </button>
      <p id="auth-locked" class="meta" hidden data-i18n="knock.auth_locked">
        Ask your parent to open a registration window for this device.
      </p>
    </section>

    <section id="hero-card" class="card hero" hidden>
      <button id="knock-all" class="big-btn" disabled>…</button>
      <p id="hero-meta" class="meta"></p>
    </section>

    <div id="map-links"></div>

    <section class="card" id="services-card" hidden>
      <h2 data-i18n="users.allowed_services">…</h2>
      <ul id="services-list"></ul>
    </section>

    <section class="card" id="active-card">
      <h2 data-i18n="card.active_sessions">…</h2>
      <ul id="active-list"><li class="muted" data-i18n="common.loading">…</li></ul>
    </section>

    <section class="card" id="stats-card">
      <h2 data-i18n="card.stats">…</h2>
      <p id="stats-summary" class="muted" data-i18n="stats.no_data">…</p>
      <div id="stats-week" class="week-bars"></div>
    </section>

    <button id="revoke" class="link-btn" hidden data-i18n="btn.revoke">…</button>

    <div id="dialog" class="dialog">
      <div class="dialog-box">
        <h3 id="dialog-title"></h3>
        <p id="dialog-body"></p>
        <div class="dialog-actions">
          <button id="dialog-cancel" class="btn">Cancel</button>
          <button id="dialog-confirm" class="btn btn-warn">Continue</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </main>
  <script src="{{BASE}}/webauthn.js"></script>
  <script src="{{BASE}}/u.js"></script>
</body>
</html>
