# gamedash — dashboard + UFW sidecar + docker-socket-proxy.
#
# Game servers (Minecraft, Terraria, etc.) are managed separately —
# they can live in their own compose stacks or be started any other
# way. Gamedash reaches them by calling `docker start|stop|inspect`
# against the host daemon, via a tightly-scoped socket proxy
# (see the `docker-proxy` service below). All that matters is that
# the container name in services.json matches a running container on
# the same Docker host.
#
# See README.md for the services.json schema and Caddy reverse-proxy
# examples.

services:
  dashboard:
    image: ghcr.io/palchrb/gamedash:latest
    # Or build locally:
    # build: ./api
    container_name: gamedash
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Referenced by services.json via passwordEnv — the dashboard
      # reads it to dial RCON. Must match the Minecraft RCON password.
      RCON_PASSWORD: "${RCON_PASSWORD:-}"

      # WebAuthn: these MUST match the address bar the browser uses.
      # For HTTPS behind a reverse proxy, set them to your real host,
      # e.g. ADMIN_RP_ID=dash.example.com, ADMIN_ORIGIN=https://dash.example.com
      ADMIN_RP_ID: "${ADMIN_RP_ID:-localhost}"
      ADMIN_ORIGIN: "${ADMIN_ORIGIN:-http://localhost:3000}"

      # Reverse-proxy: "loopback" is fine when nothing else forwards;
      # set to the proxy's IP(s) or "true" when terminating TLS upstream.
      TRUST_PROXY: "${TRUST_PROXY:-loopback}"

      # UFW sidecar: the dashboard calls this URL for firewall operations.
      UFW_SIDECAR_URL: "http://ufw-sidecar:9090"

      # Point the docker CLI at the scoped proxy instead of the real
      # socket. The proxy whitelists only the four endpoints gamedash
      # actually uses (start / stop / inspect / logs) — see the
      # docker-proxy service below.
      DOCKER_HOST: "tcp://docker-proxy:2375"

      # UI defaults
      DEFAULT_SERVICE_ID: "${DEFAULT_SERVICE_ID:-mc1}"
      DEFAULT_LOCALE: "${DEFAULT_LOCALE:-en}"
      TZ: "Europe/Oslo"

      # Optional: require a passkey on the per-child PWA too.
      KNOCK_REQUIRE_PASSKEY: "${KNOCK_REQUIRE_PASSKEY:-false}"
    volumes:
      - ./data:/data
      # Mount game server data dirs for backup / world-switching / logs.
      # The paths below must match the dataDir values in services.json.
      # Make sure the host path is writable by uid 1000 (the `node` user
      # inside the gamedash image) — see the "Permissions" section in
      # README.md for the one-liner chown.
      # - /path/to/mc-server/data:/mc-data
    networks:
      - default
      # Join the Minecraft server's network so RCON can reach it by
      # container name. Adjust the network name to match your MC stack.
      # - mcnet
    depends_on:
      - ufw-sidecar
      - docker-proxy

  docker-proxy:
    # Scoped Docker-socket proxy. Exposes only a whitelist of the
    # Docker API to the dashboard container so a compromise of
    # gamedash can't pivot to full root-on-host via docker.sock.
    #
    # What's enabled:
    #   CONTAINERS=1  →  GET /containers/*         (inspect, status)
    #   POST=1        →  start / stop / restart    (only on enabled paths)
    #
    # Everything else — exec, build, pull, volume create, secrets,
    # images, networks, system info, swarm — is blocked by default.
    # In particular EXEC stays 0: gamedash never shells into other
    # containers, and disabling it closes the biggest escape hatch.
    image: tecnativa/docker-socket-proxy:latest
    container_name: gamedash-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 1
      # Explicit zeros are defensive — the defaults already block
      # these, but listing them makes the security boundary obvious
      # to anyone reading the compose file.
      EXEC: 0
      BUILD: 0
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      SERVICES: 0
      SECRETS: 0
      CONFIGS: 0
      PLUGINS: 0
      SYSTEM: 0
      INFO: 0
      AUTH: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # No ports published to the host — only reachable on the internal
    # compose network by the dashboard.
    networks:
      - default

  ufw-sidecar:
    image: ghcr.io/palchrb/gamedash/ufw-sidecar:latest
    # Or build locally:
    # build: ./sidecar
    container_name: ufw-sidecar
    restart: unless-stopped
    pid: host
    privileged: true
    # The sidecar uses nsenter -t 1 to run ufw / ss / conntrack from
    # the HOST namespaces. The host must have ufw + iproute2 installed;
    # conntrack is optional (only needed for UDP smart-revoke + playtime).
    #
    # Only the dashboard talks to it over the default compose network.
    # No ports are published to the host.

# External networks — uncomment and adjust the name to match the
# Docker network your game servers run on (check with `docker network ls`).
# networks:
#   mcnet:
#     external: true
#     name: minecraft_mcnet
