# gamedash — minimal reference stack.
#
# Three services:
#   mc          one Minecraft server (itzg/minecraft-server)
#   dashboard   the gamedash API + admin UI + per-child PWA
#   ufw-agent   tiny privileged sidecar that the dashboard shells into
#               via `nsenter -t 1` to drive UFW and read kernel state
#               (ss / conntrack) from the host
#
# Add more game servers by duplicating the `mc` block and registering
# them in ./data/services.json. See README.md for the services.json
# schema. If you prefer one compose file per game, swap `mcnet` for an
# externally-created `mc-shared` network and declare `external: true`
# in each compose.

services:
  mc:
    image: itzg/minecraft-server:latest
    container_name: mc1
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
      - "19132:19132/udp"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "4096M"
      TZ: "Europe/Oslo"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD:?RCON_PASSWORD must be set}"
    volumes:
      - ./data:/data
    networks:
      - mcnet

  dashboard:
    image: ghcr.io/palchrb/gamedash:latest
    # Or build locally:
    # build: ./api
    container_name: gamedash
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Referenced by services.json via passwordEnv — the dashboard
      # reads it to dial RCON. Must match the Minecraft RCON password.
      RCON_PASSWORD: "${RCON_PASSWORD:?RCON_PASSWORD must be set}"

      # WebAuthn: these MUST match the address bar the browser uses.
      # For HTTPS behind a reverse proxy, set them to your real host,
      # e.g. ADMIN_RP_ID=dash.example.com, ADMIN_ORIGIN=https://dash.example.com
      ADMIN_RP_ID: "${ADMIN_RP_ID:-localhost}"
      ADMIN_ORIGIN: "${ADMIN_ORIGIN:-http://localhost:3000}"

      # Reverse-proxy: "loopback" is fine when nothing else forwards;
      # set to the proxy's IP(s) or "true" when terminating TLS upstream.
      TRUST_PROXY: "${TRUST_PROXY:-loopback}"

      # UI defaults
      DEFAULT_SERVICE_ID: "${DEFAULT_SERVICE_ID:-mc1}"
      DEFAULT_LOCALE: "${DEFAULT_LOCALE:-en}"
      TZ: "Europe/Oslo"

      # Optional: require a passkey on the per-child PWA too.
      KNOCK_REQUIRE_PASSKEY: "${KNOCK_REQUIRE_PASSKEY:-false}"
    volumes:
      - ./data:/mcdata
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mc
    networks:
      - mcnet

  ufw-agent:
    image: alpine:latest
    container_name: ufw-agent
    command: ["sleep", "infinity"]
    pid: host
    privileged: true
    restart: unless-stopped
    # The agent uses `nsenter -t 1 -m` to run ufw / ss / conntrack from
    # the HOST filesystem, so the alpine image here is only a parking
    # spot. The host must have ufw + iproute2 installed; conntrack is
    # optional and only needed for UDP smart-revoke + UDP playtime.

networks:
  mcnet:
    driver: bridge
