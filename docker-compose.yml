# gamedash — dashboard + ufw sidecar.
#
# Game servers (Minecraft, Terraria, etc.) are managed separately —
# they can live in their own compose stacks or be started any other
# way. Gamedash reaches them via `docker exec <container>`, so all
# that matters is that the container name in services.json matches a
# running container on the same Docker host.
#
# See README.md for the services.json schema and Caddy reverse-proxy
# examples.

services:
  dashboard:
    image: ghcr.io/palchrb/gamedash:latest
    # Or build locally:
    # build: ./api
    container_name: gamedash
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Referenced by services.json via passwordEnv — the dashboard
      # reads it to dial RCON. Must match the Minecraft RCON password.
      RCON_PASSWORD: "${RCON_PASSWORD:-}"

      # WebAuthn: these MUST match the address bar the browser uses.
      # For HTTPS behind a reverse proxy, set them to your real host,
      # e.g. ADMIN_RP_ID=dash.example.com, ADMIN_ORIGIN=https://dash.example.com
      ADMIN_RP_ID: "${ADMIN_RP_ID:-localhost}"
      ADMIN_ORIGIN: "${ADMIN_ORIGIN:-http://localhost:3000}"

      # Reverse-proxy: "loopback" is fine when nothing else forwards;
      # set to the proxy's IP(s) or "true" when terminating TLS upstream.
      TRUST_PROXY: "${TRUST_PROXY:-loopback}"

      # UI defaults
      DEFAULT_SERVICE_ID: "${DEFAULT_SERVICE_ID:-mc1}"
      DEFAULT_LOCALE: "${DEFAULT_LOCALE:-en}"
      TZ: "Europe/Oslo"

      # Optional: require a passkey on the per-child PWA too.
      KNOCK_REQUIRE_PASSKEY: "${KNOCK_REQUIRE_PASSKEY:-false}"
    volumes:
      - ./data:/mcdata
      - /var/run/docker.sock:/var/run/docker.sock

  ufw-agent:
    image: alpine:latest
    container_name: ufw-agent
    command: ["sleep", "infinity"]
    pid: host
    privileged: true
    restart: unless-stopped
    # The agent uses `nsenter -t 1 -m` to run ufw / ss / conntrack from
    # the HOST filesystem, so the alpine image here is only a parking
    # spot. The host must have ufw + iproute2 installed; conntrack is
    # optional and only needed for UDP smart-revoke + UDP playtime.
